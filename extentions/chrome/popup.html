<!DOCTYPE html>
<html>
<head>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --accent: #238636;
      --text: #c9d1d9;
      --muted: #8b949e;
      --line: #30363d;
    }
    body { 
      width: 300px; 
      padding: 16px; 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; 
      background: var(--bg);
      color: var(--text);
      margin: 0;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--line);
    }
    .header h3 { margin: 0; font-size: 16px; letter-spacing: 0.5px; }
    .header img { width: 24px; height: 24px; }
    
    .section-title {
      font-size: 10px;
      font-weight: 800;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 8px;
      display: block;
    }

    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 4px; }
    input { 
      width: 100%; 
      padding: 8px 10px; 
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--text);
      font-size: 13px;
      box-sizing: border-box;
      outline: none;
    }
    input:focus { border-color: var(--accent); }

    button { 
      width: 100%; 
      padding: 10px; 
      background: var(--accent);
      border: none;
      border-radius: 6px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    #status { 
      margin-top: 12px; 
      font-size: 12px; 
      padding: 8px;
      border-radius: 4px;
      display: none;
    }
    .status-success { display: block !important; background: rgba(35, 134, 54, 0.1); color: #3fb950; border: 1px solid rgba(63, 185, 80, 0.3); }
    .status-error { display: block !important; background: rgba(248, 51, 73, 0.1); color: #f85149; border: 1px solid rgba(248, 81, 73, 0.3); }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }
    .tab {
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
      padding-bottom: 4px;
      border-bottom: 2px solid transparent;
    }
    .tab.active {
      color: var(--text);
      border-color: var(--accent);
    }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
  </style>
</head>
<body>
  <div class="header">
    <h3>RoleFlux Ingest</h3>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="extract">Extract</div>
    <div class="tab" data-tab="settings">Settings</div>
  </div>

  <div id="extract" class="tab-content active">
    <div class="form-group">
      <span class="section-title">Capture Data</span>
      <label for="selector">CSS Selector (Target Section)</label>
      <input type="text" id="selector" value="body" placeholder="e.g. .job-description, main, body">
    </div>
    <button id="extractBtn">Send to RoleFlux</button>
  </div>

  <div id="settings" class="tab-content">
    <div class="form-group">
      <span class="section-title">Server Config</span>
      <label for="port">Local Port</label>
      <input type="text" id="port" placeholder="Default: 14201">
    </div>
    <div class="form-group">
      <label for="secret">Secret Key</label>
      <input type="password" id="secret" placeholder="Check app Inbox tab">
    </div>
    <button id="saveSettingsBtn">Save Configuration</button>
  </div>

  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
